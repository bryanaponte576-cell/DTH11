<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo IoT - ESP32 & Firebase</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase App & Database CDNs (v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* Reset & Estilos Base en Modo Oscuro */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    /* Contenedor Flex de Tarjetas */
    .card-container {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      width: 100%;
      max-width: 800px;
    }
    
    /* Tarjetas de Métricas Elegantes */
    .card {
      background: #1e1e1e;
      padding: 20px 30px;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      text-align: center;
      flex: 1;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #3d3d3d;
    }
    .card h3 {
      margin: 0 0 10px 0;
      color: #a0a0a0;
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card p {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0;
    }
    
    /* Efecto Neón / Glow en los valores */
    .temp {
      color: #ff5252;
      text-shadow: 0 0 12px rgba(255, 82, 82, 0.3);
    }
    .hum {
      color: #40c4ff;
      text-shadow: 0 0 12px rgba(64, 196, 255, 0.3);
    }

    /* Caja de la Gráfica */
    .chart-box {
      width: 100%;
      max-width: 800px;
      background: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>

  <h1>Panel de Monitoreo IoT en Tiempo Real</h1>

  <div class="card-container">
    <div class="card">
      <h3>Temperatura</h3>
      <p class="temp"><span id="tempVal">--</span> °C</p>
    </div>
    <div class="card">
      <h3>Humedad</h3>
      <p class="hum"><span id="humVal">--</span> %</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="iotChart"></canvas>
  </div>

  <script>
    // 1. Configuración de Firebase Realtime Database
    const firebaseConfig = {
      databaseURL: "https://esp32-sensor-90474-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Credenciales del Bot de Telegram
    const TELEGRAM_BOT_TOKEN = "8609793978:AAHcSOF6VxCtLVGSJFg4uNNrY2C4RxW4Tes";
    const TELEGRAM_CHAT_ID = "6179026824";
    const UMBRAL_TEMPERATURA = 30.0; // Umbral crítico para enviar alerta
    let alertaEnviada = false;

    // 3. Inicialización del Gráfico con Chart.js (Estilo Oscuro)
    const ctx = document.getElementById('iotChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [], 
        datasets: [
          {
            label: 'Temperatura (°C)',
            borderColor: '#ff5252',
            backgroundColor: 'rgba(255, 82, 82, 0.15)',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#ff5252',
            data: [],
            fill: true,
            tension: 0.3
          },
          {
            label: 'Humedad (%)',
            borderColor: '#40c4ff',
            backgroundColor: 'rgba(64, 196, 255, 0.15)',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#40c4ff',
            data: [],
            fill: true,
            tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: {
              color: '#e0e0e0',
              font: { family: 'Segoe UI', size: 13 }
            }
          }
        },
        scales: {
          x: { 
            title: { display: true, text: 'Hora de Lectura', color: '#a0a0a0' },
            ticks: { color: '#a0a0a0' },
            grid: { color: '#2d2d2d' }
          },
          y: { 
            beginAtZero: true,
            ticks: { color: '#a0a0a0' },
            grid: { color: '#2d2d2d' }
          }
        }
      }
    });

    // 4. Función para enviar alerta a Telegram mediante la API REST
    function enviarAlertaTelegram(temperatura) {
      const mensaje = `⚠️ *ALERTA CRÍTICA DE TEMPERATURA* ⚠️\n\nLa temperatura actual ha superado el umbral asignado: *${temperatura} °C*.\n¡Por favor verificar el entorno!`;
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(mensaje)}&parse_mode=Markdown`;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          if (data.ok) {
            console.log("Alerta enviada a Telegram con éxito.");
          } else {
            console.error("Error al enviar alerta a Telegram:", data);
          }
        })
        .catch(err => console.error("Error de red:", err));
    }

    // 5. Escuchar cambios en tiempo real desde Firebase
    const ambienteRef = database.ref('ambiente');
    ambienteRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const temp = data.temperatura;
        const hum = data.humedad;
        const horaActual = new Date().toLocaleTimeString();

        // Actualizar valores numéricos en pantalla
        document.getElementById('tempVal').innerText = temp;
        document.getElementById('humVal').innerText = hum;

        // Actualizar gráfico Chart.js (mantener solo las últimas 10 lecturas)
        if (chart.data.labels.length >= 10) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
          chart.data.datasets[1].data.shift();
        }

        chart.data.labels.push(horaActual);
        chart.data.datasets[0].data.push(temp);
        chart.data.datasets[1].data.push(hum);
        chart.update();

        // Verificación del umbral de temperatura para enviar la alerta
        if (temp > UMBRAL_TEMPERATURA && !alertaEnviada) {
          enviarAlertaTelegram(temp);
          alertaEnviada = true; // Previene envío múltiple de alertas consecutivas
        } else if (temp <= UMBRAL_TEMPERATURA) {
          alertaEnviada = false; // Restablece el estado si la temperatura baja
        }
      }
    });
  </script>
</body>
</html>
